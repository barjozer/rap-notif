# A placer dans ton repo GitHub sous : .github/workflows/notif.yml
# NOTE : ce planning suppose un repo PUBLIC (minutes GitHub Actions illimitees).
# Les crons sont en heure UTC (Paris = UTC+2 en ete, UTC+1 en hiver).
name: Rap Notif

on:
  schedule:
    # Rythme de base : toutes les 10 minutes
    - cron: "*/10 * * * *"
    # Boost sorties du vendredi : toutes les 5 min
    # du jeudi 21h UTC (23h Paris) au vendredi 01h UTC (03h Paris)
    - cron: "*/5 21-23 * * 4"
    - cron: "*/5 0-1 * * 5"
  workflow_dispatch:          # lancement manuel depuis GitHub

permissions:
  contents: write             # necessaire pour sauvegarder state.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install requests

      - name: Lancer le script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rap_notif.py

      - name: Sauvegarder l'etat
        run: |
          git config user.name "rap-notif-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update state"
          git push
